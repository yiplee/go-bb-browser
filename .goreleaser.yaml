version: 2
project_name: go-bb-browser

before:
  hooks:
    - go mod tidy

builds:
  - id: bb-browser
    main: ./cmd/bb-browser
    binary: bb-browser
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: bb-daemon
    main: ./cmd/bb-daemon
    binary: bb-daemon
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    ids: [bb-browser, bb-daemon]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - AGENTS.md

dockers:
  - id: ghcr-amd64
    goos: linux
    goarch: amd64
    ids: [bb-browser, bb-daemon]
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/yiplee/go-bb-browser:{{ .Version }}-amd64"
      - "ghcr.io/yiplee/go-bb-browser:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/yiplee/go-bb-browser"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.licenses=MIT"

  - id: ghcr-arm64
    goos: linux
    goarch: arm64
    ids: [bb-browser, bb-daemon]
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/yiplee/go-bb-browser:{{ .Version }}-arm64"
      - "ghcr.io/yiplee/go-bb-browser:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/yiplee/go-bb-browser"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/yiplee/go-bb-browser:{{ .Version }}"
    image_templates:
      - "ghcr.io/yiplee/go-bb-browser:{{ .Version }}-amd64"
      - "ghcr.io/yiplee/go-bb-browser:{{ .Version }}-arm64"

  - name_template: "ghcr.io/yiplee/go-bb-browser:latest"
    image_templates:
      - "ghcr.io/yiplee/go-bb-browser:latest-amd64"
      - "ghcr.io/yiplee/go-bb-browser:latest-arm64"
    skip_push: auto

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  draft: false
  prerelease: auto
